  createdAt: String!
}

enum ApprovalStatus {
  PENDING
  APPROVED
  REJECTED
  SKIPPED
}

type ApprovalStep {
  id: ID!
  approverStaffId: String!
  decisionStatus: ApprovalStatus!
  approverComment: String
