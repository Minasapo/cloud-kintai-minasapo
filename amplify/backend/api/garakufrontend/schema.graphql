}

type Workflow @model @auth(rules: [{ allow: private }]) {
  id: ID!
  approvedStaffIds: [String]
  rejectedStaffIds: [String]
  finalDecisionTimestamp: String
  category: WorkflowCategory
  customWorkflowTitle: String
  customWorkflowContent: String
  staffId: String! @index(name: "byStaffId", queryField: "workflowsByStaffId")
  status: WorkflowStatus!
  assignedApproverStaffIds: [String]
  approvalSteps: [ApprovalStep]
  nextApprovalStepIndex: Int
  submitterApproverSetting: ApproverSettingMode
  submitterApproverId: String
  submitterApproverIds: [String]
  submitterApproverMultipleMode: ApproverMultipleMode
  overTimeDetails: OverTimeWorkflow
  comments: [WorkflowComment]
  version: Int
}

type WorkflowTemplate @model @auth(rules: [{ allow: private }]) {
  id: ID!
  name: String!
  title: String!
  content: String!
  organizationId: String!
    @index(
      name: "workflowTemplatesByOrganizationId"
      queryField: "workflowTemplatesByOrganizationId"
    )
  version: Int
}

enum WorkflowNotificationEventType {
  WORKFLOW_COMMENT
}

type WorkflowNotificationEvent @model @auth(rules: [{ allow: private }]) {
  id: ID!
  recipientStaffId: String!
    @index(
      name: "workflowNotificationEventsByRecipient"
      sortKeyFields: ["eventAt"]
      queryField: "workflowNotificationEventsByRecipient"
    )
  actorStaffId: String!
  workflowId: ID!
    @index(
      name: "workflowNotificationEventsByWorkflow"
      sortKeyFields: ["eventAt"]
      queryField: "workflowNotificationEventsByWorkflow"
    )
  eventType: WorkflowNotificationEventType!
  commentId: ID
  title: String!
  body: String!
  isRead: Boolean!
  readAt: String
  eventAt: String!
  version: Int
}

type OperationLog @model @auth(rules: [{ allow: private }]) {
  id: ID!
  staffId: String
    @index(
      name: "byStaffId"
      sortKeyFields: ["timestamp"]
      queryField: "operationLogsByStaffId"
    )
  resourceKey: String!
    @index(
      name: "byResourceKey"
      sortKeyFields: ["timestamp"]
      queryField: "operationLogsByResourceKey"
    )
  targetStaffId: String
  # 行った操作の種類（例: "LOGIN", "ATTENDANCE_UPDATE"）
  action: String!
  # 対象リソースの種類（例: "Attendance", "Workflow", "AppConfig"）
  resource: String
  # 対象リソースの ID（あれば）
  resourceId: String
  summary: String
  # ISO 8601 形式のタイムスタンプ
  timestamp: String!
  before: AWSJSON
  after: AWSJSON
  diff: AWSJSON
  # 操作の詳細（JSON）
  details: AWSJSON
  # オプション: 発生元 IP
  ipAddress: String
  # オプション: ユーザーエージェント
  userAgent: String
  # 任意の追加メタデータ（JSON）
  metadata: AWSJSON
  # クライアントのタイムゾーン（例: Asia/Tokyo）
  clientTimezone: String
  # クライアントで観測した発生時刻（ISO 8601）
  occurredAt: String
  # 業務日換算後の勤務日（YYYY-MM-DD）
  resolvedWorkDate: String
  # クライアント側で生成した冪等キー
  idempotencyKey: String
  # クライアントアプリのバージョン
  appVersion: String
  # 重大度レベル（例: INFO, WARN, ERROR）
  severity: String
  logFormatVersion: Int!
  version: Int
}

type AuditLog @model @auth(rules: [{ allow: groups, groups: ["Admin"] }]) {
  id: ID!
  resourceType: String!
  resourceId: String!
  action: String!
  actorId: ID!
  actorRole: String
  requestId: String!
  ip: String
  userAgent: String
  before: AWSJSON
  after: AWSJSON
  diff: AWSJSON
  createdAt: AWSDateTime!
  ttl: AWSTimestamp
  reason: String
  version: Int
}

