input UpsertAttendanceByStaffAndDateInput {
  staffId: String!
  workDate: String!
  occurredAt: String!
  action: String!
  idempotencyKey: String!
  startTime: String
  endTime: String
  goDirectlyFlag: Boolean
  returnDirectlyFlag: Boolean
  absentFlag: Boolean
  rests: [UpsertRestInput]
  hourlyPaidHolidayTimes: [UpsertHourlyPaidHolidayTimeInput]
