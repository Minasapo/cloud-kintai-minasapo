type Staff @model @auth(rules: [{ allow: private }]) {
  id: ID!
  cognitoUserId: String!
    @index(
      name: "byCognitoUserId"
      sortKeyFields: ["id"]
      queryField: "staffByCognitoUserId"
    )
  familyName: String
  givenName: String
  mailAddress: String!
  role: String!
  enabled: Boolean!
  status: String!
  owner: Boolean
  usageStartDate: String
  notifications: Notification
  externalLinks: [StaffExternalLink]
  sortKey: String
  workType: String
  developer: Boolean
  approverSetting: ApproverSettingMode
  approverSingle: String
  approverMultiple: [String]
  approverMultipleMode: ApproverMultipleMode
  shiftGroup: String
  attendanceManagementEnabled: Boolean
  version: Int
}

enum ApproverSettingMode {
  ADMINS
  SINGLE
  MULTIPLE
}

enum ApproverMultipleMode {
  ANY
  ORDER
}

type Notification {
  workStart: Boolean
  workEnd: Boolean
}

type StaffExternalLink {
