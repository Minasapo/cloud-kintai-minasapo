enum WorkflowCategory {
  PAID_LEAVE
  ABSENCE
  OVERTIME
  CLOCK_CORRECTION
  CUSTOM
}

enum WorkflowStatus {
  DRAFT
  SUBMITTED
  PENDING
  APPROVED
  REJECTED
  CANCELLED
}

type OverTimeWorkflow {
  date: String!
  startTime: String!
  endTime: String!
  reason: String!
}

type WorkflowComment {
  id: ID!
  staffId: String!
