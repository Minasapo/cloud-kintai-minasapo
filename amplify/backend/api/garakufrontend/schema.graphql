  paidHolidayFlag: Boolean
  specialHolidayFlag: Boolean
  isDeemedHoliday: Boolean
  hourlyPaidHolidayHours: Int
  substituteHolidayDate: String
}

input UpsertRestInput {
  startTime: String
  endTime: String
}

input UpsertHourlyPaidHolidayTimeInput {
  startTime: String
  endTime: String
}

type Mutation {
  upsertAttendanceByStaffAndDate(
    input: UpsertAttendanceByStaffAndDateInput!
